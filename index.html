<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- SEO -->
  <title>AUREA | Premium Aesthetic Clinic</title>
  <meta name="description" content="AUREA Aesthetic Clinic — personalized treatments, modern technology and certified specialists. Book your consultation today.">
  <meta name="keywords" content="aesthetic clinic, botox, dermal fillers, facial harmonization, skin care, premium aesthetics">
  <meta name="author" content="AUREA Aesthetics">
  <meta name="robots" content="index, follow">

  <!-- Open Graph -->
  <meta property="og:title" content="AUREA | Premium Aesthetic Clinic">
  <meta property="og:description" content="Enhance your beauty with safe, personalized treatments at AUREA.">
  <meta property="og:image" content="./assets/images/hero-bg.jpg">
  <meta property="og:url" content="https://www.aurea-aesthetics.com">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="en_US">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="./assets/images/logo.svg">

  <!-- Tailwind CSS (CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Tailwind Custom Config -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: {
              light: '#4FC3E0',
              DEFAULT: '#2BB8E0',
              soft: '#E8F7FB',
              lighter: '#F0FAFC',
            },
            neutral: {
              bg: '#F8F9FA',
              border: '#E5E7EB',
              text: '#6B7280',
              title: '#1F2937',
              dark: '#111827',
            }
          },
          fontFamily: {
            heading: ['"DM Serif Display"', 'serif'],
            body: ['Inter', 'sans-serif'],
          },
          container: {
            center: true,
            padding: '1rem',
          },
        }
      }
    }
  </script>

  <!-- Custom CSS -->
  <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body>
  <header>

  </header>

  <main>
<section id="hero" class="relative w-full min-h-[calc(100vh-80px)] bg-neutral-bg pb-96 md:pb-72">
  
  <!-- Background com texto gigante -->
  <div class="absolute inset-0 flex items-start justify-center pt-20 md:pt-32 pointer-events-none overflow-hidden">
    <h1 class="font-heading text-[28vw] md:text-[18vw] lg:text-[16vw] text-neutral-border/40 select-none leading-none tracking-tight">
      AUREA
    </h1>
  </div>

  <!-- Container do conteúdo -->
  <div class="relative z-10 container mx-auto max-w-7xl px-6 h-full flex items-center justify-center">

    <!-- Imagem centro -->
    <div class="relative flex items-end justify-center pt-12">
      <img 
        src="./assets/images/hero-model.png" 
        alt="Aesthetic treatment specialist" 
        class="relative z-0 max-h-[40vh] md:max-h-[50vh] w-auto object-contain"
      >
    </div>

    <!-- Card flutuante ESQUERDO -->
    <div class="hidden md:block absolute left-6 lg:left-16 top-1/2 -translate-y-1/2 bg-white/60 backdrop-blur-md border border-white/80 rounded-2xl px-6 py-5 shadow-sm max-w-[220px]">
      <p class="text-sm text-neutral-title leading-relaxed">
        Compassionate care, <br>
        <span class="font-medium">Confident results.</span>
      </p>
    </div>

    <!-- Card flutuante DIREITO -->
    <div class="hidden md:block absolute right-6 lg:right-16 top-1/2 -translate-y-1/2 bg-white/60 backdrop-blur-md border border-white/80 rounded-2xl px-6 py-5 shadow-sm max-w-[220px]">
      <div class="flex items-center gap-3 mb-2">
        <span class="font-heading text-3xl text-neutral-title">10+</span>
        <div class="flex -space-x-2">
          <div class="w-8 h-8 rounded-full bg-primary-light border-2 border-white"></div>
          <div class="w-8 h-8 rounded-full bg-primary border-2 border-white"></div>
          <div class="w-8 h-8 rounded-full bg-neutral-border border-2 border-white"></div>
        </div>
      </div>
      <p class="text-sm text-neutral-text leading-relaxed">
        Highly expert and <br>
        professional specialists.
      </p>
    </div>

    <!-- Card central com CTA -->
    <div class="absolute z-20 -bottom-[230px] left-1/2 -translate-x-1/2 w-full max-w-2xl px-4 md:px-6">
      <div class="bg-white/60 backdrop-blur-md border border-white/80 rounded-3xl px-6 py-6 md:px-8 md:py-8 shadow-sm text-center">
        
        <h2 class="font-heading text-2xl md:text-4xl lg:text-5xl text-neutral-title leading-tight mb-4">
          Transform your beauty <br class="hidden sm:block">
          with <span class="italic">expert aesthetic care</span>
        </h2>
        
        <p class="text-sm md:text-base text-neutral-text mb-6 max-w-lg mx-auto">
          We combine the latest advancements in aesthetic technology to deliver safe, personalized and natural results.
        </p>
        
        <a 
          href="#contact" 
          class="inline-flex items-center justify-center px-8 py-3 bg-primary text-white text-sm font-medium rounded-full hover:bg-primary-light transition-colors shadow-md"
        >
          Explore Treatments
        </a>
        
      </div>
    </div>

  </div>

</section>
  </main>

  <footer>

  </footer>

  <!-- JS -->
  <script src="./assets/js/main.js"></script>
</body>
</html>
